<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Nervio | Reset Your System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background-color: #050505; margin: 0; padding: 0; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    const Icon = ({ children, className = "w-5 h-5" }) => (
      <span className={`${className} inline-flex items-center justify-center leading-none`}>
        {children}
      </span>
    );

    const TRANSLATIONS = {
      en: {
        welcome: "Quiet the noise.",
        subWelcome: "Just breathe.",
        done: "Stillness found.",
        session: "Session",
        stayLong: "Stay as long as you need.",
        howFeel: "How do you feel now?",
        better: "Better",
        same: "Same",
        worse: "Worse",
        breathe: "Breathe",
        pause: "Pause",
        resume: "Resume",
        finish: "Finish",
        startAgain: "Start Again",
        panicMessage: "It’s okay if your breath is small. Just go gently.",
        modes: {
          calm: { name: "Calm", sub: "Ease anxiety" },
          focus: { name: "Focus", sub: "Clear the mind" },
          sleep: { name: "Sleep", sub: "Prepare for rest" },
          panic: { name: "Reset", sub: "Overwhelmed" }
        },
        durations: {
          quick: "Quick",
          min1: "1 min",
          min2: "2 min"
        },
        phases: {
          READY: "Ready",
          INHALE: "Inhale",
          HOLD: "Hold",
          EXHALE: "Exhale",
          HOLD_POST: "Hold"
        },
        reassurances: [
          "You’re doing fine.",
          "Just stay with the rhythm.",
          "Let the tension soften.",
          "One breath at a time."
        ]
      },
      fr: {
        welcome: "Apaisez le bruit.",
        subWelcome: "Respirez simplement.",
        done: "Sérénité trouvée.",
        session: "Séance",
        stayLong: "Restez aussi longtemps que nécessaire.",
        howFeel: "Comment vous sentez-vous ?",
        better: "Mieux",
        same: "Pareil",
        worse: "Moins bien",
        breathe: "Respirer",
        pause: "Pause",
        resume: "Reprendre",
        finish: "Terminer",
        startAgain: "Recommencer",
        panicMessage: "Ce n'est pas grave si votre souffle est court. Allez-y doucement.",
        modes: {
          calm: { name: "Calme", sub: "Apaiser l'anxiété" },
          focus: { name: "Focus", sub: "Libérer l'esprit" },
          sleep: { name: "Sommeil", sub: "Préparer le repos" },
          panic: { name: "Reset", sub: "Submergé" }
        },
        durations: {
          quick: "Rapide",
          min1: "1 min",
          min2: "2 min"
        },
        phases: {
          READY: "Prêt",
          INHALE: "Inspirer",
          HOLD: "Retenir",
          EXHALE: "Expirer",
          HOLD_POST: "Retenir"
        },
        reassurances: [
          "Tout va bien.",
          "Suivez simplement le rythme.",
          "Laissez les tensions fondre.",
          "Une respiration à la fois."
        ]
      },
      es: {
        welcome: "Silencia el ruido.",
        subWelcome: "Solo respira.",
        done: "Paz encontrada.",
        session: "Sesión",
        stayLong: "Quédate todo el tiempo que necesites.",
        howFeel: "¿Cómo te sientes ahora?",
        better: "Mejor",
        same: "Igual",
        worse: "Peor",
        breathe: "Respirar",
        pause: "Pausa",
        resume: "Reanudar",
        finish: "Finalizar",
        startAgain: "Empezar de nuevo",
        panicMessage: "Está bien si tu respiración es corta. Solo sigue suavemente.",
        modes: {
          calm: { name: "Calma", sub: "Aliviar ansiedad" },
          focus: { name: "Foco", sub: "Despejar la mente" },
          sleep: { name: "Sueño", sub: "Preparar el descanso" },
          panic: { name: "Reset", sub: "Abrumado" }
        },
        durations: {
          quick: "Rápido",
          min1: "1 min",
          min2: "2 min"
        },
        phases: {
          READY: "Listo",
          INHALE: "Inhala",
          HOLD: "Mantén",
          EXHALE: "Exhala",
          HOLD_POST: "Mantén"
        },
        reassurances: [
          "Lo estás haciendo bien.",
          "Solo sigue el ritmo.",
          "Deja que la tensión se suelte.",
          "Una respiración a la vez."
        ]
      }
    };

    const MODES = [
      { id: 'calm', icon: '〰️', tech: 'relax' },
      { id: 'focus', icon: '⚡', tech: 'box' },
      { id: 'sleep', icon: '🌙', tech: 'equal' },
      { id: 'panic', icon: '⚠️', tech: 'panic' },
    ];

    const TECHNIQUES = {
      box: { inhale: 2, hold: 2, exhale: 2, holdPost: 2 },
      relax: { inhale: 1.5, hold: 0, exhale: 2.0, holdPost: 0 },
      equal: { inhale: 2.5, hold: 0, exhale: 2.5, holdPost: 0 },
      panic: { inhale: 1.2, hold: 0, exhale: 1.8, holdPost: 0 },
    };

    const DURATIONS_CONFIG = [
      { id: '30s', key: 'quick', value: 30 },
      { id: '1m', key: 'min1', value: 60 },
      { id: '2m', key: 'min2', value: 120 }
    ];

    const TRANSITION_CLASS = "transition-all duration-1000 [transition-timing-function:cubic-bezier(0.19,1,0.22,1)]";

    function App() {
      const [lang, setLang] = useState('en');
      const t = TRANSLATIONS[lang];

      const [modeId, setModeId] = useState(MODES[0].id);
      const [durationId, setDurationId] = useState(DURATIONS_CONFIG[2].id);
      const [difficultyOffset, setDifficultyOffset] = useState(0);
      const [totalSessions, setTotalSessions] = useState(0);

      const [isIdle, setIsIdle] = useState(true);
      const [active, setActive] = useState(false);
      const [phase, setPhase] = useState('READY');
      const [timer, setTimer] = useState(0);
      const [elapsed, setElapsed] = useState(0);
      const [isMuted, setIsMuted] = useState(false);
      const [completed, setCompleted] = useState(false);
      const [feedbackGiven, setFeedbackGiven] = useState(false);
      const [reassuranceIndex, setReassuranceIndex] = useState(0);

      const audioCtx = useRef(null);
      const isPanic = modeId === 'panic';
      const mode = MODES.find(m => m.id === modeId);
      const duration = DURATIONS_CONFIG.find(d => d.id === durationId);

      const technique = useMemo(() => {
        const base = TECHNIQUES[mode.tech];
        if (isPanic) return base;
        return {
          ...base,
          inhale: Math.max(1.5, base.inhale + difficultyOffset),
          exhale: Math.max(2, base.exhale + difficultyOffset),
          hold: base.hold > 0 ? Math.max(1.5, base.hold + (difficultyOffset * 0.5)) : 0,
          holdPost: base.holdPost > 0 ? Math.max(1.5, base.holdPost + (difficultyOffset * 0.5)) : 0
        };
      }, [mode.tech, difficultyOffset, isPanic]);

      const initAudio = () => {
        if (!audioCtx.current) {
          const Ctx = window.AudioContext || window.webkitAudioContext;
          if (Ctx) audioCtx.current = new Ctx();
        }
      };

      const playTone = (freq, dur = 1.0) => {
        if (isMuted || !audioCtx.current) return;
        try {
          const ctx = audioCtx.current;
          if (ctx.state === 'suspended') ctx.resume();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.frequency.setValueAtTime(freq, ctx.currentTime);
          gain.gain.setValueAtTime(0, ctx.currentTime);
          gain.gain.linearRampToValueAtTime(0.006, ctx.currentTime + 0.8);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start();
          osc.stop(ctx.currentTime + dur);
        } catch (e) {}
      };

      const triggerCompletion = () => {
        setActive(false);
        setCompleted(true);
        setFeedbackGiven(false);
        setTotalSessions(prev => prev + 1);
        playTone(349.23, 2.5);
      };

      const cancelSession = () => {
        setActive(false);
        setIsIdle(true);
        setPhase('READY');
        setTimer(0);
        setElapsed(0);
        setCompleted(false);
      };

      useEffect(() => {
        let interval = null;
        if (active) {
          interval = setInterval(() => {
            setElapsed(prev => {
              const next = prev + 1;
              if (next % 12 === 0 && !isPanic) setReassuranceIndex(i => (i + 1) % t.reassurances.length);
              if (!isPanic && duration.value && next >= duration.value) {
                triggerCompletion();
                return prev;
              }
              return next;
            });

            setTimer(prev => {
              const currentDur = { INHALE: technique.inhale, HOLD: technique.hold, EXHALE: technique.exhale, HOLD_POST: technique.holdPost }[phase] || 0;
              if (prev >= currentDur && currentDur > 0) {
                setPhase(current => {
                  if (current === 'INHALE') return technique.hold > 0 ? 'HOLD' : 'EXHALE';
                  if (current === 'HOLD') return 'EXHALE';
                  if (current === 'EXHALE') return technique.holdPost > 0 ? 'HOLD_POST' : 'INHALE';
                  return 'INHALE';
                });
                return 1;
              }
              return prev + 1;
            });
          }, 1000);
        }
        return () => clearInterval(interval);
      }, [active, phase, technique, duration, isPanic, t.reassurances.length]);

      useEffect(() => {
        if (!active) return;
        if (phase === 'INHALE') playTone(174.61, technique.inhale);
        else if (phase === 'EXHALE') playTone(174.61, technique.exhale);
      }, [phase, active]);

      const handleStart = () => {
        initAudio();
        if (completed) { cancelSession(); return; }
        if (isIdle) {
          setIsIdle(false);
          setPhase('INHALE');
          setTimer(0);
          setElapsed(0);
          setActive(true);
        } else {
          if (isPanic) triggerCompletion();
          else setActive(!active);
        }
      };

      const handleFeedback = (score) => {
        if (score === 'worse') setDifficultyOffset(prev => Math.max(-3, prev - 0.5));
        if (score === 'better') setDifficultyOffset(prev => Math.min(6, prev + 0.5));
        setFeedbackGiven(true);
      };

      const scale = useMemo(() => {
        if (!active || phase === 'READY') return 1;
        const dur = { INHALE: technique.inhale, HOLD: technique.hold, EXHALE: technique.exhale, HOLD_POST: technique.holdPost }[phase] || 1;
        const progress = Math.min(timer / dur, 1);
        if (phase === 'INHALE') return 1 + progress * 0.8;
        if (phase === 'HOLD') return 1.8;
        if (phase === 'EXHALE') return 1.8 - progress * 0.8;
        return 1;
      }, [timer, phase, active, technique]);

      return (
        <div
          className={`min-h-screen bg-[#050505] text-white flex flex-col font-sans overflow-hidden select-none antialiased ${isIdle ? 'cursor-pointer' : ''}`}
          onClick={() => isIdle && handleStart()}
        >
          {!isPanic && (
            <div className="fixed top-0 left-0 w-full h-[1px] bg-white/5 z-[100]">
              <div
                className="h-full bg-white shadow-[0_0_15px_rgba(255,255,255,0.4)] transition-all duration-1000"
                style={{ width: `${duration.value ? (elapsed / duration.value) * 100 : 0}%`, opacity: active ? 1 : 0 }}
              />
            </div>
          )}

          <nav className="p-8 md:p-12 flex justify-between items-center z-[60] relative">
            <div className="flex items-center gap-3">
              <div className="w-1 h-5 bg-white rounded-full shadow-[0_0_8px_white]" />
              <h1 className="text-lg font-black tracking-tighter uppercase italic">Nervio</h1>
            </div>

            <div className="flex items-center gap-2 md:gap-4">
              <div className="flex gap-2 bg-white/5 p-1 rounded-xl mr-2 border border-white/5">
                {['en', 'fr', 'es'].map((l) => (
                  <button
                    key={l}
                    onClick={(e) => { e.stopPropagation(); setLang(l); }}
                    className={`text-[8px] font-black uppercase px-2 py-1 rounded-lg transition-all ${lang === l ? 'bg-white text-black' : 'text-zinc-600 hover:text-zinc-400'}`}
                  >
                    {l}
                  </button>
                ))}
              </div>

              {!isIdle && !completed && (
                <button
                  onClick={(e) => { e.stopPropagation(); cancelSession(); }}
                  className="p-3 bg-white/5 hover:bg-white/10 rounded-2xl border border-white/5 transition-all group active:scale-95"
                  aria-label="Cancel session"
                >
                  <Icon className="w-4 h-4 text-zinc-500 group-hover:text-white">✕</Icon>
                </button>
              )}
              <button
                onClick={(e) => { e.stopPropagation(); setIsMuted(!isMuted); }}
                className="p-3 bg-white/5 hover:bg-white/10 rounded-2xl border border-white/5 active:scale-95 transition-all"
                aria-label="Toggle sound"
              >
                <Icon className={`w-4 h-4 ${isMuted ? 'text-zinc-500' : 'text-zinc-300'}`}>{isMuted ? '🔇' : '🔊'}</Icon>
              </button>
            </div>
          </nav>

          <main className="flex-1 flex flex-col items-center justify-center relative px-8">
            {isIdle && !completed && (
              <div className={`absolute top-0 inset-x-0 pt-6 md:pt-10 flex flex-col items-center text-center px-8 ${TRANSITION_CLASS}`}>
                <h2 className="text-4xl md:text-6xl font-black tracking-tighter leading-[0.9] mb-4">{t.welcome}</h2>
                <p className="text-zinc-600 text-sm md:text-lg max-w-sm font-medium uppercase tracking-widest opacity-50">{t.subWelcome}</p>
              </div>
            )}

            {completed && (
              <div className={`absolute top-0 inset-x-0 pt-6 md:pt-10 flex flex-col items-center text-center px-8 ${TRANSITION_CLASS}`}>
                <div className="w-14 h-14 bg-white rounded-full flex items-center justify-center mb-6 shadow-[0_0_40px_white]">
                  <Icon className="w-6 h-6 text-black">✓</Icon>
                </div>
                <h2 className="text-4xl font-black tracking-tighter italic text-white uppercase leading-none">{t.done}</h2>
                <p className="text-zinc-600 text-[10px] md:text-xs mt-3 font-bold uppercase tracking-[0.2em]">{t.session} #{totalSessions} • {t.stayLong}</p>
              </div>
            )}

            <div className={`relative w-72 h-72 md:w-[32rem] md:h-[32rem] flex items-center justify-center ${TRANSITION_CLASS} ${isIdle ? 'translate-y-8 opacity-20' : 'translate-y-0 opacity-100'}`}>
              <div className={`absolute w-64 h-64 bg-white shadow-[0_0_100px_rgba(255,255,255,0.03)] rounded-full blur-[80px] ${TRANSITION_CLASS} ${phase === 'INHALE' ? 'opacity-30' : 'opacity-10'} ${completed ? 'opacity-40 scale-110' : ''}`} />

              <div className={TRANSITION_CLASS} style={{ transform: `scale(${scale})` }}>
                <div className={`w-32 h-32 md:w-48 md:h-48 bg-gradient-to-br from-white via-zinc-100 to-zinc-400 shadow-[0_0_60px_rgba(255,255,255,0.1)] rounded-[2.5rem] md:rounded-[4rem] ${active || completed ? 'opacity-100' : 'opacity-20'}`} />
              </div>

              <div className="absolute -bottom-32 inset-x-0 flex flex-col items-center text-center">
                <h3 className={`text-6xl md:text-[9rem] font-black italic tracking-tighter uppercase ${TRANSITION_CLASS} ${active || completed ? 'opacity-100 scale-100' : 'opacity-0 scale-95 text-zinc-900'}`}>
                  {completed ? 'Done' : (active ? t.phases[phase] : t.modes[mode.id].name)}
                </h3>

                {active && !completed && (
                  <p className="mt-8 text-zinc-500 font-bold text-[10px] md:text-xs uppercase tracking-[0.2em] italic max-w-xs transition-opacity duration-1000">
                    {isPanic ? t.panicMessage : t.reassurances[reassuranceIndex]}
                  </p>
                )}
              </div>
            </div>
          </main>

          <section className="px-8 md:px-12 pb-12 w-full max-w-xl mx-auto flex flex-col gap-6 z-[70] relative">
            {completed && !feedbackGiven && (
              <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-700">
                <p className="text-center text-zinc-500 text-[10px] font-black uppercase tracking-[0.3em]">{t.howFeel}</p>
                <div className="grid grid-cols-3 gap-3">
                  {['better', 'same', 'worse'].map((f) => (
                    <button key={f} onClick={() => handleFeedback(f)} className="p-4 bg-white/5 border border-white/5 rounded-2xl flex flex-col items-center gap-2 hover:bg-white hover:text-black transition-all group active:scale-95">
                      <Icon className="w-5 h-5">{f === 'better' ? '🙂' : f === 'same' ? '😐' : '☹️'}</Icon>
                      <span className="text-[9px] font-black uppercase tracking-widest">{t[f]}</span>
                    </button>
                  ))}
                </div>
              </div>
            )}

            {isIdle && !completed && (
              <div className={`space-y-6 ${TRANSITION_CLASS}`}>
                <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                  {MODES.map((m) => (
                    <button
                      key={m.id}
                      onClick={(e) => { e.stopPropagation(); setModeId(m.id); }}
                      className={`p-5 rounded-[2rem] border relative ${TRANSITION_CLASS} flex flex-col items-start gap-4 active:scale-95 ${modeId === m.id ? 'bg-white text-black shadow-xl border-white' : 'bg-zinc-900/40 border-white/5 text-zinc-600'}`}
                    >
                      <div className={`p-2.5 rounded-xl ${modeId === m.id ? 'bg-black text-white' : 'bg-white/5'}`}>
                        <Icon className="w-4 h-4">{m.icon}</Icon>
                      </div>
                      <div className="text-left leading-none">
                        <span className="text-[10px] font-black uppercase tracking-widest block mb-1">{t.modes[m.id].name}</span>
                        <span className="text-[8px] font-bold opacity-60 uppercase">{t.modes[m.id].sub}</span>
                      </div>
                    </button>
                  ))}
                </div>

                {!isPanic && (
                  <div className="bg-zinc-900/30 p-1.5 rounded-[2rem] border border-white/5 grid grid-cols-3 gap-1">
                    {DURATIONS_CONFIG.map((d) => (
                      <button
                        key={d.id}
                        onClick={(e) => { e.stopPropagation(); setDurationId(d.id); }}
                        className={`py-3.5 rounded-[1.5rem] text-[10px] font-black uppercase tracking-widest ${durationId === d.id ? 'bg-zinc-800 text-white shadow-lg' : 'text-zinc-700'}`}
                      >
                        {t.durations[d.key]}
                      </button>
                    ))}
                  </div>
                )}
              </div>
            )}

            <div className="space-y-4">
              {(!completed || feedbackGiven) && (
                <button
                  onClick={(e) => { e.stopPropagation(); handleStart(); }}
                  className={`w-full py-8 md:py-9 rounded-[3rem] font-black text-2xl md:text-3xl tracking-tighter ${TRANSITION_CLASS} bg-white text-black active:scale-95 shadow-2xl flex items-center justify-center gap-4`}
                >
                  {active && !isPanic && <Icon className="w-7 h-7">⏸</Icon>}
                  {completed ? t.startAgain : (isIdle ? t.breathe : (active ? (isPanic ? t.finish : t.pause) : t.resume))}
                </button>
              )}
            </div>
          </section>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
